<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoWSims 诊断测试</title>
    <style>
        body { background: #1a1f2e; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .ok { color: #00cc66; }
        .fail { color: #ff4444; }
        .pending { color: #f0c040; }
        #results { margin-top: 20px; line-height: 2; }
    </style>
</head>
<body>
    <h1>WoWSims 诊断测试</h1>
    <p>正在检测各项资源是否可加载...</p>
    <div id="results"></div>
    <script>
        const results = document.getElementById('results');
        function log(msg, ok) {
            const div = document.createElement('div');
            div.className = ok ? 'ok' : (ok === false ? 'fail' : 'pending');
            div.textContent = (ok ? '✅ ' : (ok === false ? '❌ ' : '⏳ ')) + msg;
            results.appendChild(div);
        }
        
        // Test 1: Check WASM support
        try {
            if (typeof WebAssembly !== 'undefined') {
                log('WebAssembly 支持: 正常', true);
            } else {
                log('WebAssembly 支持: 不支持!', false);
            }
        } catch(e) { log('WebAssembly 检测异常: ' + e.message, false); }
        
        // Test 2: Check ES Module support
        try {
            log('ES Module 支持: 正常 (此脚本正在执行)', true);
        } catch(e) {}
        
        // Test 3: Test fetch db.json
        fetch('/wowsims-mobile/assets/database/db.json', {method: 'HEAD'})
            .then(r => log('db.json: HTTP ' + r.status, r.ok))
            .catch(e => log('db.json 加载失败: ' + e.message, false));
        
        // Test 4: Test fetch lib.wasm (just headers)
        fetch('/wowsims-mobile/lib.wasm', {method: 'HEAD'})
            .then(r => log('lib.wasm: HTTP ' + r.status + ' (' + (parseInt(r.headers.get('content-length')||0)/1024/1024).toFixed(1) + 'MB)', r.ok))
            .catch(e => log('lib.wasm 加载失败: ' + e.message, false));
        
        // Test 5: Test sim_worker.js
        fetch('/wowsims-mobile/sim_worker.js', {method: 'HEAD'})
            .then(r => log('sim_worker.js: HTTP ' + r.status, r.ok))
            .catch(e => log('sim_worker.js 加载失败: ' + e.message, false));
        
        // Test 6: Test entry JS
        fetch('/wowsims-mobile/bundle/index-fae6fc4b.entry.js', {method: 'HEAD'})
            .then(r => log('entry.js: HTTP ' + r.status, r.ok))
            .catch(e => log('entry.js 加载失败: ' + e.message, false));
        
        // Test 7: Test Worker creation
        try {
            const w = new Worker('/wowsims-mobile/sim_worker.js');
            w.onmessage = (e) => {
                if (e.data.msg === 'ready') {
                    log('Web Worker + WASM 加载: 成功!', true);
                    w.terminate();
                }
            };
            w.onerror = (e) => {
                log('Web Worker 错误: ' + (e.message || '未知错误'), false);
            };
            setTimeout(() => {
                if (!w.onmessage._called) {
                    // Check if WASM is still loading
                    log('WASM 加载可能较慢(40MB)，请耐心等待...', null);
                }
            }, 10000);
            log('Web Worker 创建: 成功', true);
        } catch(e) { log('Web Worker 创建失败: ' + e.message, false); }
        
        // Test 8: Test CSS loading
        log('CSS 加载: 正在检查...', null);
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/wowsims-mobile/mobile.css';
        link.onload = () => log('CSS 加载: 正常', true);
        link.onerror = () => log('CSS 加载失败', false);
        document.head.appendChild(link);
    </script>
</body>
</html>
